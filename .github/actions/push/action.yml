name: reusable-release

runs:
  using: "composite"
  steps:
    - name: Configure Git user
      shell: bash
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Test
      if: ${{ github.event_name != 'workflow_run' }}
      shell: bash
      run: make test

    - name: Perform release
      shell: bash
      run: GIT_RELEASE=1 make clean release

    - name: Publish to AUR
      shell: bash
      env:
        AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
      run: |
        VERSION=$(grep pkgver dist/PKGBUILD | cut -d'=' -f2)

        mkdir -p ~/.ssh
        echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
        chmod 600 ~/.ssh/aur
        echo -e "Host aur.archlinux.org\n\tIdentityFile ~/.ssh/aur\n\tUser aur\n\tStrictHostKeyChecking no" >> ~/.ssh/config

        git clone ssh://aur@aur.archlinux.org/rog-perf-tuner-git.git aur_repo
        cd aur_repo

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        cp ../dist/PKGBUILD .
        cp ../dist/.SRCINFO .
        cp ../dist/rog-perf-tuner-git.install .

        git add PKGBUILD .SRCINFO rog-perf-tuner-git.install
        git diff-index --quiet HEAD || git commit -m "Release $VERSION-1"
        git push
