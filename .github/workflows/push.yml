name: Release rog-perf-tuner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Test
        run: make test

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Setup AUR SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo -e "Host aur.archlinux.org\n\tIdentityFile ~/.ssh/aur\n\tUser aur\n\tStrictHostKeyChecking no" >> ~/.ssh/config

      - name: Get CMake version
        id: cmake_version
        run: |
          VERSION=$(grep -oP 'VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get last git tag
        id: git_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          TAG=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check version vs tag
        id: check_version
        run: |
          if [ "${{ steps.cmake_version.outputs.version }}" != "${{ steps.git_tag.outputs.tag }}" ]; then
            echo "different=true" >> $GITHUB_OUTPUT
          else
            echo "different=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if tag exists
        if: steps.check_version.outputs.different == 'true'
        run: |
          VERSION=${{ steps.cmake_version.outputs.version }}
          git fetch --tags
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag '$VERSION' already exists! Failing workflow."
            exit 1
          fi

      - name: Create Git tag
        if: steps.check_version.outputs.different == 'true'
        run: |
          VERSION=${{ steps.cmake_version.outputs.version }}
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Perform release
        if: steps.check_version.outputs.different != 'true'
        run: |
          GIT_RELEASE=1 make clean release

  publish_stable:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.check_version_different == 'true'
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Publish stable AUR
        run: |
          VERSION=$(grep pkgver dist/PKGBUILD | cut -d'=' -f2)
          git clone ssh://aur@aur.archlinux.org/rog-perf-tuner.git aur_repo
          cd aur_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp ../dist/PKGBUILD .
          cp ../dist/.SRCINFO .
          cp ../dist/rog-perf-tuner-git.install .
          git add PKGBUILD .SRCINFO rog-perf-tuner-git.install
          git diff-index --quiet HEAD || git commit -m "Release $VERSION-1"
          git push

  publish_git:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.check_version_different == 'true'
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Publish git AUR
        run: |
          VERSION=$(grep pkgver dist/PKGBUILD | cut -d'=' -f2)
          git clone ssh://aur@aur.archlinux.org/rog-perf-tuner-git.git aur_git_repo
          cd aur_git_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp ../dist/PKGBUILD .
          cp ../dist/.SRCINFO .
          cp ../dist/rog-perf-tuner-git.install .
          git add PKGBUILD .SRCINFO rog-perf-tuner-git.install
          git diff-index --quiet HEAD || git commit -m "Release $VERSION-1"
          git push
