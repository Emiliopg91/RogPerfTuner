name: Release rog-perf-tuner-git

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Release rog-perf-tuner"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Test
        run: |
          make test

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Get CMake version
        id: cmake_version
        run: |
          VERSION=$(grep -oP 'VERSION\s+\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get last git tag
        id: git_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          TAG=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check version vs tag
        id: check_version
        run: |
          if [ "${{ steps.cmake_version.outputs.version }}" != "${{ steps.git_tag.outputs.tag }}" ]; then
            echo "different=true" >> $GITHUB_OUTPUT
          else
            echo "different=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger release workflow
        if: github.event_name != 'workflow_run' && steps.check_version.outputs.different == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Version changed → triggering release workflow"
          gh workflow run "Release rog-perf-tuner"
          exit 0

      - name: Perform release
        if: github.event_name != 'workflow_run' && steps.check_version.outputs.different != 'true'
        run: |
          GIT_RELEASE=1 make clean release

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        if: github.event_name != 'workflow_run' && steps.check_version.outputs.different != 'true'
        run: |
          VERSION=$(grep pkgver dist/PKGBUILD | cut -d'=' -f2)

          echo "Setting SSH key for AUR..."
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo -e "Host aur.archlinux.org\n\tIdentityFile ~/.ssh/aur\n\tUser aur\n\tStrictHostKeyChecking no" >> ~/.ssh/config

          echo "Cloning AUR repository..."
          git clone ssh://aur@aur.archlinux.org/rog-perf-tuner-git.git aur_repo
          cd aur_repo

          echo "Configuring Git identity..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Copying files..."
          cp ../dist/PKGBUILD .
          cp ../dist/.SRCINFO .
          cp ../dist/rog-perf-tuner-git.install .

          echo "Committing changes..."
          git add PKGBUILD .SRCINFO rog-perf-tuner-git.install
          git diff-index --quiet HEAD || git commit -m "Release $VERSION-1"
          git push
