name: Release rog-perf-tuner-git

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Release rog-perf-tuner"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release-local:
    runs-on: [self-hosted, asus-rog-strix]
    timeout-minutes: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Run release
        uses: ./.github/actions/push
        with:
          aur_ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  release-fallback:
    runs-on: ubuntu-latest
    needs: release-local
    if: failure() || cancelled()

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Run release
        uses: ./.github/actions/push
        with:
          aur_ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
