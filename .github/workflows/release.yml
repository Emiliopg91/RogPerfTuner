on:
  push:
    tags:
      - "*.*.*-*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag and extract version
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ "$TAG" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            RELEASE="${BASH_REMATCH[2]}"
          else
            echo "Invalid tag format: $TAG"
            echo "Expected: x.y.z-r (numeric)"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE=$RELEASE" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

          echo "VERSION=$VERSION"
          echo "RELEASE=$RELEASE"

      - name: Version bump
        run: |
          echo "Updating version in CMakeLists.txt to '${VERSION}'..."

          sed -i -E "s/(project\([^)]*VERSION )[0-9]+\.[0-9]+\.[0-9]+/\1${VERSION}/" CMakeLists.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "[chore] ${VERSION}-${RELEASE}"
          fi

          git push origin HEAD:main
          git push origin HEAD:develop --force

      - name: Process release
        run: |
          make release

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          echo "Setting SSH key for AUR..."
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF

          echo "Cloning AUR repository..."
          git clone ssh://aur@aur.archlinux.org/rog-perf-tuner.git aur_repo
          cd aur_repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Copying files..."
          cp ../dist/PKGBUILD .
          cp ../dist/.SRCINFO .
          cp ../dist/rog-perf-tuner.install .

          echo "Committing changes..."
          git add PKGBUILD .SRCINFO rog-perf-tuner.install
          git diff-index --quiet HEAD || git commit -m "Release ${TAG}"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body_path: dist/changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
